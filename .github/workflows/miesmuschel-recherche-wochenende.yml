name: Miesmuschel Recherche Wochenend-Vorschau (Donnerstag)

on:
  schedule:
    - cron: '30 14 * * 4'
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/recherche-wochenende.trigger'

permissions:
  contents: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Recherche Wochenend-Vorschau)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export ANKER=$(TZ=Europe/Berlin date -d "next Saturday" +%Y-%m-%d)
          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            "Du bist Recherche-Cloud-Routine fuer die WOCHENEND-VORSCHAU. Lies .github/scripts/subagent_prompts/recherche_routine.md.

          AUFGABE: data/recherche_wochenende/$ANKER.json (Modus: wochenende, Anker = kommender Samstag $ANKER).

          Sammle ALLE Sa+So-Spiele (BL/PL/LaLiga/Serie A/Ligue 1 + 2.BL + Pokale + CL/EL/Conference + NBA-Playoffs).

          KEINE Tipps - nur Daten. Position-Genauigkeit Pflicht.

          Am Ende: git add + commit 'Auto-Recherche Wochenende $ANKER (Vorschau)' + git push origin main."
