name: Miesmuschel Recherche Mo-Fr (Pre-Tipps Datenbasis)

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/recherche-mo-fr.trigger'

permissions:
  contents: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Recherche)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export HEUTE=$(TZ=Europe/Berlin date +%Y-%m-%d)
          echo "Recherche fuer: $HEUTE"

          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            "Du bist Recherche-Cloud-Routine in der Magische-Miesmuschel-Pipeline.

          Lies vollstaendig den Master-Prompt aus .github/scripts/subagent_prompts/recherche_routine.md.

          AUFGABE: Recherche-File fuer HEUTE ($HEUTE) erstellen unter data/recherche/$HEUTE.json (Modus: tag).

          Pflicht-Schritte:
          1. football-data.org API + balldontlie API + WebSearch fuer Spielplan
          2. Pro Spiel: Squad via Transfermarkt + Kicker + ESPN (Position-Genauigkeit Pflicht!)
          3. Verletzungen + Sperren via WebSearch
          4. Parallele Wettbewerbe (Verband-URL Pflicht wenn nicht 'keine')
          5. bet365-Quoten via Aggregator
          6. News kompakt 3-5 pro Spiel

          KEINE Tipps generieren - nur Daten.
          NIE Spielernamen erfinden.
          POSITION-Genauigkeit Pflicht (DM != ST, Hojlund-Bug-Schutz).

          Am Ende: git add + commit 'Auto-Recherche $HEUTE (Pre-Tipps Datenbasis Mo-Fr)' + git push origin main."
