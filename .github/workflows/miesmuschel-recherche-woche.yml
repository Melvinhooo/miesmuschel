name: Miesmuschel Recherche Wochen-Vorschau (Sonntag)

on:
  schedule:
    - cron: '30 14 * * 0'
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/recherche-woche.trigger'

permissions:
  contents: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Recherche Wochen-Vorschau)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export ANKER=$(TZ=Europe/Berlin date -d "next Monday" +%Y-%m-%d)
          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            "Du bist Recherche-Cloud-Routine fuer die WOCHEN-VORSCHAU. Lies .github/scripts/subagent_prompts/recherche_routine.md.

          AUFGABE: data/recherche_woche/$ANKER.json (Modus: woche, Anker = kommender Montag $ANKER).

          Sammle ALLE Mo-So-Spiele der kommenden Woche. Token-Budget 120 Min, fokussiere auf Top-Ligen wenn knapp.

          KEINE Tipps - nur Daten.

          Am Ende: git add + commit 'Auto-Recherche Woche $ANKER (Vorschau)' + git push origin main."
