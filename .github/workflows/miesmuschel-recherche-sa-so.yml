name: Miesmuschel Recherche Sa+So (Pre-Tipps Datenbasis)

on:
  # WM-Modus 10.06.2026: Sa-So-Recherche-Cron deaktiviert, weil täglicher
  # miesmuschel-recherche-mo-fr-Workflow auch Sa+So abdeckt. Manueller Trigger
  # via workflow_dispatch oder File-Trigger bleibt für Notfälle.
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/recherche-sa-so.trigger'

permissions:
  contents: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Recherche Sa-So)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export HEUTE=$(TZ=Europe/Berlin date +%Y-%m-%d)
          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            "Du bist Recherche-Cloud-Routine (Sa-So Variante). Lies .github/scripts/subagent_prompts/recherche_routine.md vollstaendig.

          AUFGABE: data/recherche/$HEUTE.json (Modus: tag, Wochenende = mehr Spielmenge BL/PL/NBA-Playoffs).

          Recherche-Workflow:
          1. Spielplan via football-data + balldontlie + WebSearch fuer Pokal/Cup
          2. Pro Spiel: Squad via Transfermarkt + Kicker (Position-Genauigkeit Pflicht!)
          3. Verletzungen + Sperren + parallele Wettbewerbe + bet365-Quoten
          4. NIE Spielernamen erfinden, NIE Quoten erfinden

          Am Ende: git add + commit 'Auto-Recherche $HEUTE (Sa-So)' + git push origin main."
