name: Miesmuschel Recherche Sa+So (Pre-Tipps Datenbasis)

on:
  schedule:
    # Sa+So 07:00 Berlin (UTC+2 MESZ) -> 05:00 UTC
    - cron: '0 5 * * 6,0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  id-token: write

jobs:
  recherche:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Recherche-Routine via Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Du bist Recherche-Cloud-Routine in der Magische-Miesmuschel-Pipeline. Lies vollständig den Recherche-Prompt aus `.github/scripts/subagent_prompts/recherche_routine.md` und führe die Recherche für HEUTE aus.

            Output-Pfad: `data/recherche/<HEUTE>.json` wo HEUTE = $(TZ=Europe/Berlin date +%Y-%m-%d)
            Modus: "tag"
            Wochenend-Modus: heute ist Sa oder So → erwartete Spielmenge größer (BL Sa-Spieltag, PL Sa-Spieltag, NBA-Playoffs etc.)

            Am Ende: git add + commit "Auto-Recherche <HEUTE> (Pre-Tipps Datenbasis Sa-So)" + git push origin main.

            KEINE Tipps generieren - NUR Daten.
          claude_args: |
            --allowed-tools "Bash(git:*) Bash(python3:*) Bash(date:*) Bash(curl:*) Bash(mkdir:*) Bash(ls:*) Bash(cat:*) Read Write Edit Glob Grep WebSearch WebFetch"
            --max-turns 60
            --model claude-opus-4-7
