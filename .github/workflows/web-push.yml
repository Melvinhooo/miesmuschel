name: Web Push on Tipps Update

on:
  push:
    branches: [main]
    paths:
      - 'data/tipps/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install --quiet pywebpush
      - name: Schema-Fix (Routine-Output -> app.js-Format)
        run: python .github/scripts/fix_schema.py
      - name: tipps.js regenerieren
        run: |
          python -c "
          import json, glob
          files = sorted(glob.glob('data/tipps/*.json'))
          if files:
              latest = files[-1]
              with open(latest, 'rb') as f: data = f.read().decode('utf-8')
              with open('data/tipps.js', 'wb') as f:
                  f.write(('// Auto-generiert\n' + 'window.__MIESMUSCHEL_TIPPS = ' + data + ';\n').encode('utf-8'))
              print(f'tipps.js aus {latest} regeneriert')
          "
      - name: Commit + Push (wenn Schema-Fix Aenderungen brachte)
        continue-on-error: true
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/tipps/ data/tipps.js
          if ! git diff --cached --quiet; then
            git commit -m "Schema-Fix + tipps.js regen via Action"
            git push origin main
          else
            echo "Nichts zu committen"
          fi
      - name: Web-Push senden
        if: ${{ always() && !contains(github.event.head_commit.message, 'Schema-Fix') }}
        run: python .github/scripts/send_push.py
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUB: ${{ secrets.PUSH_SUB }}
