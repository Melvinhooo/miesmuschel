name: Miesmuschel Maintenance (Wöchentlich Sonntag 21:00)

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/maintenance.trigger'

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install --quiet pywebpush
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Maintenance)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUB: ${{ secrets.PUSH_SUB }}
        run: |
          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch" \
            --permission-mode acceptEdits \
            "Du bist Maintenance-Routine. Lies .github/scripts/subagent_prompts/maintenance_routine.md vollstaendig.

          AUFGABEN:
          1. Schema-Migration Check (data/lessons.json + beobachtungs_ligen.json + markt_*.json + statistik.json + kasse.json valide?)
          2. Stale-File-Detection (data/tipps/ + data/recherche/ aelter als 30 Tage -> archiv/)
          3. Statistik-Plausibilitaet (rolling 7d vs 30d Spruenge)
          4. Health-Report aufs iPhone via .github/scripts/send_push.py
          5. git commit + push

          KEIN Routinen-Loeschen. Stale-Files werden ARCHIVIERT, nie geloescht."
