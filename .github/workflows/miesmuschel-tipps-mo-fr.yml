name: Miesmuschel Tipps Mo-Fr (ersetzt kaputte Cloud-Routine)

on:
  schedule:
    # Täglich 14:00 Berlin (MESZ UTC+2) -> 12:00 UTC
    # WM 2026 Modus: läuft NACH Recherche (12:00) damit aktuelle Daten genutzt werden.
    # Frühestes Spiel des Tages startet typisch 18:00 Berlin -> 4h Vorlauf passt.
    # Watchdog 15:00 als Backup falls Hauptlauf fehlschlägt.
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/triggers/tipps-mo-fr.trigger'

permissions:
  contents: write

jobs:
  tipps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm install -g @anthropic-ai/claude-code
      - run: |
          git config user.email "actions@github.com"
          git config user.name "Miesmuschel Cloud Routine"

      - name: Run Claude (Master-Tipps Mo-Fr)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export HEUTE=$(TZ=Europe/Berlin date +%Y-%m-%d)
          claude --print \
            --model claude-opus-4-7 \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            --permission-mode acceptEdits \
            "Du bist Master-Tipps-Routine in der Magische-Miesmuschel-Pipeline. Lies .github/scripts/subagent_prompts/master_tipps_routine.md vollstaendig.

          HEUTE = $HEUTE (Mo-Fr).

          Phase 1: lies data/recherche/$HEUTE.json (wenn fehlt: Fallback-Recherche selbst machen via recherche_routine.md)
          Phase 2: pro Spiel saison_kontext + 3-5 Tipps generieren (Fussball-Pattern aus fussball_analyse.md, NBA aus nba_analyse.md)
          Phase 3: Dossier zusammenbauen mit Layer-1+2+3 Diversifikation, 4 Kombis Safe ~3-5x / Balance ~6-10x / Risiko ~15-30x / Moonshot ~100x+
          Phase 4: interne Verifikation laut verifikation.md (Halluzinations-Drops, Selbstwidersprueche, Layer-Cross-Check, _verifikations_report{})
          Phase 5: Output data/tipps/$HEUTE.json

          HARTREGELN: max 5 Tipps/Spiel, Layer-2 hart, gesamtquote PFLICHT, NIE Halluzinationen.

          Am Ende: git add + commit 'Auto-Tipps $HEUTE (Pipeline via GitHub Action Mo-Fr)' + git push origin main.

          GitHub-Action web-push.yml triggert dann automatisch Schema-Fix + JS-Wrapper + iOS-Push."
